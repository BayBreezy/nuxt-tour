name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to nuxt-tour!

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this feature solve? What are you trying to accomplish?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behaviour
      description: How would you like the feature to work? Include example code if possible.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found any workarounds or alternative approaches?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, references, or anything else that might be helpful.
