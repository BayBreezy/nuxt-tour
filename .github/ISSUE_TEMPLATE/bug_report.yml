name: Bug report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as possible.

  - type: input
    id: version
    attributes:
      label: nuxt-tour version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: nuxt-version
    attributes:
      label: Nuxt version
      placeholder: e.g. 4.4.4
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. 20.18.0

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Set up tour with `steps: [...]`
        2. Call `startTour()`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: repro-link
    attributes:
      label: Minimal reproduction
      description: Link to a StackBlitz, CodeSandbox, or GitHub repo that reproduces the issue.
      placeholder: https://

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
