name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish — must match package.json (e.g. 0.0.41)"
        required: true

jobs:
  publish:
    name: Tag & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare
        run: bun run dev:prepare

      - name: Build
        run: bun run prepack

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ github.event.inputs.version }}" ]; then
            echo "Input version ${{ github.event.inputs.version }} does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag --force v${{ github.event.inputs.version }}
          git push --force origin v${{ github.event.inputs.version }}

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
