name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare
        run: bun run dev:prepare

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version & generate changelog
        run: npx changelogen --release --${{ github.event.inputs.release_type }} --no-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create release branch and open draft PR
        run: |
          git checkout -b release/v${{ steps.version.outputs.version }}
          git push origin release/v${{ steps.version.outputs.version }}
          gh pr create \
            --title "chore(release): v${{ steps.version.outputs.version }}" \
            --body "## Release v${{ steps.version.outputs.version }}

          Review and edit \`CHANGELOG.md\` in this PR before merging.
          Once merged, run the **Publish** workflow to tag and publish to npm." \
            --base main \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
